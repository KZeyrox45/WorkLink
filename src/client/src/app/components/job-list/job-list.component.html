<div class="jobs-page">
  <div class="header">
    <h2>Find Work</h2>
    <div>
      <a *ngIf="userRole === 'Client'" routerLink="/jobs/new" class="create-btn">Post a Job</a>
    </div>
  </div>

  <div class="filters">
    <input type="text" placeholder="Search jobs..." [(ngModel)]="keyword" (keyup.enter)="onFilter()" />
    <select [(ngModel)]="selectedCategory" (change)="onFilter()">
      <option value="">All Categories</option>
      <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
    </select>
    <select [(ngModel)]="selectedStatus" (change)="onFilter()">
      <option value="">All Statuses</option>
      <option value="Open">Open</option>
      <option value="InProgress">In Progress</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>

  <div *ngIf="jobs.length === 0" class="no-jobs">No jobs found.</div>

  <div *ngFor="let job of jobs" class="job-card">
    <a [routerLink]="['/jobs', job.id]" class="job-title">{{ job.title }}</a>
    <div class="job-meta">
      <span>{{ job.categoryName }}</span>
      <span class="budget" *ngIf="job.budgetMin || job.budgetMax">
        {{ job.budgetMin | currency }} - {{ job.budgetMax | currency }}
      </span>
      <span *ngIf="job.durationDays">{{ job.durationDays }} days</span>
      <span>{{ job.clientName }}</span>
      <span class="status-badge status-{{ job.status }}">{{ job.status }}</span>
    </div>
    <div *ngIf="job.skills.length > 0" style="margin-top: 0.5rem;">
      <span class="skill-tag" *ngFor="let skill of job.skills">{{ skill.name }}</span>
    </div>
  </div>

  <div class="pagination" *ngIf="totalPages > 1">
    <button [disabled]="page === 1" (click)="goToPage(page - 1)">Previous</button>
    <button *ngFor="let p of pages()" [class.active]="p === page" (click)="goToPage(p)">{{ p }}</button>
    <button [disabled]="page === totalPages" (click)="goToPage(page + 1)">Next</button>
  </div>
</div>
